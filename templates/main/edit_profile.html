{% extends "base.html" %}
{% block title %}Edit Profile{% endblock %}

{% block content %}
<section class="page-section">
    <div class="container narrow">
        <div class="page-header center">
            <h1>Edit Your Profile</h1>
        </div>
        <div class="card">
            <form method="POST" class="form-stack">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" value="{{ current_user.name }}" required>
                </div>
                <div class="form-group">
                    <label for="bio">Bio</label>
                    <textarea id="bio" name="bio" rows="4" placeholder="Tell people about yourself...">{{ current_user.bio }}</textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="city">City</label>
                        <input type="text" id="city" name="city" value="{{ current_user.city }}">
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone (optional)</label>
                        <input type="text" id="phone" name="phone" value="{{ current_user.phone }}">
                    </div>
                </div>
                <div class="form-group">
                    <label for="languages">Languages</label>
                    <input type="text" id="languages" name="languages" value="{{ current_user.languages }}" placeholder="e.g. English, Dutch, Spanish">
                    <small class="form-help">Comma-separated</small>
                </div>
                <div class="form-group">
                    <label for="interests">Interests</label>
                    <input type="text" id="interests" name="interests" value="{{ current_user.interests }}" placeholder="e.g. Reading, Travel, Coffee, Art">
                    <small class="form-help">Comma-separated</small>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Save Profile</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
