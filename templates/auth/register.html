{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Join TalkBuddy</h1>
                <p>Start meaningful conversations today</p>
            </div>
            <form method="POST" class="auth-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <div class="input-icon">
                        <span class="material-icons-outlined">person</span>
                        <input type="text" id="name" name="name" placeholder="Your full name" required value="{{ request.form.get('name', '') }}">
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-icon">
                        <span class="material-icons-outlined">email</span>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required value="{{ request.form.get('email', '') }}">
                    </div>
                </div>
                <div class="form-group">
                    <label for="city">City</label>
                    <div class="input-icon">
                        <span class="material-icons-outlined">location_on</span>
                        <input type="text" id="city" name="city" placeholder="e.g. Amsterdam" value="{{ request.form.get('city', '') }}">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-icon">
                            <span class="material-icons-outlined">lock</span>
                            <input type="password" id="password" name="password" placeholder="Min. 6 characters" required minlength="6">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirm_password">Confirm Password</label>
                        <div class="input-icon">
                            <span class="material-icons-outlined">lock</span>
                            <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat password" required>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" required>
                        I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                    </label>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Create Account</button>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
