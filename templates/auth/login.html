{% extends "base.html" %}
{% block title %}Log In{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Log in to continue your conversations</p>
            </div>
            <form method="POST" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-icon">
                        <span class="material-icons-outlined">email</span>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-icon">
                        <span class="material-icons-outlined">lock</span>
                        <input type="password" id="password" name="password" placeholder="Your password" required>
                    </div>
                </div>
                <div class="form-group flex-between">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember"> Remember me
                    </label>
                    <a href="#" class="link-subtle">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Log In</button>
            </form>
            <div class="auth-footer">
                <p>Don't have an account? <a href="{{ url_for('register') }}">Sign up free</a></p>
            </div>
            <div class="auth-demo">
                <p class="demo-label">Demo Accounts</p>
                <div class="demo-accounts">
                    <button type="button" class="demo-btn" onclick="fillDemo('user@demo.com', 'demo123')">
                        <span class="material-icons-outlined">person</span> Demo Client
                    </button>
                    <button type="button" class="demo-btn" onclick="fillDemo('emma@demo.com', 'demo123')">
                        <span class="material-icons-outlined">face</span> Demo Provider
                    </button>
                    <button type="button" class="demo-btn" onclick="fillDemo('admin@talkbuddy.com', 'admin123')">
                        <span class="material-icons-outlined">admin_panel_settings</span> Admin
                    </button>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
function fillDemo(email, password) {
    document.getElementById('email').value = email;
    document.getElementById('password').value = password;
}
</script>
{% endblock %}
