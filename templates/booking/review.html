{% extends "base.html" %}
{% block title %}Write a Review{% endblock %}

{% block content %}
<section class="page-section">
    <div class="container narrow">
        <div class="page-header center">
            <h1>Review Your Session</h1>
            <p class="text-muted">with {{ booking.provider.name }} on {{ booking.date.strftime('%B %d, %Y') }}</p>
        </div>

        <div class="card">
            <form method="POST" class="form-stack">
                <div class="form-group">
                    <label>Rating</label>
                    <div class="star-rating" id="starRating">
                        {% for i in range(1, 6) %}
                        <label class="star-label">
                            <input type="radio" name="rating" value="{{ i }}" {{ 'checked' if i == 5 }}>
                            <span class="star">★</span>
                        </label>
                        {% endfor %}
                    </div>
                </div>

                <div class="form-group">
                    <label for="comment">Your Review (optional)</label>
                    <textarea id="comment" name="comment" rows="4" placeholder="How was your experience? Would you recommend this TalkBuddy?"></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-full btn-lg">Submit Review</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
